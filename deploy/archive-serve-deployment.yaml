apiVersion: apps/v1
kind: Deployment
metadata:
  name: archive-serve
  namespace: factory
  labels:
    app.kubernetes.io/name: archive-serve
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: claude-code-factory
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: archive-serve
  template:
    metadata:
      labels:
        app.kubernetes.io/name: archive-serve
        app.kubernetes.io/component: api
    spec:
      imagePullSecrets:
        - name: ghcr-login
      containers:
        - name: archive-serve
          image: ghcr.io/timholm/arxiv-archive:latest
          args: ["serve", "--addr", ":9090"]
          ports:
            - containerPort: 9090
              name: http
              protocol: TCP
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-credentials
                  key: POSTGRES_URL
            - name: LLM_ROUTER_URL
              valueFrom:
                secretKeyRef:
                  name: factory-secrets
                  key: LLM_ROUTER_URL
          resources:
            requests:
              memory: "64Mi"
              cpu: "10m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 9090
            initialDelaySeconds: 10
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: archive-serve
  namespace: factory
  labels:
    app.kubernetes.io/name: archive-serve
    app.kubernetes.io/component: api
    app.kubernetes.io/part-of: claude-code-factory
spec:
  selector:
    app.kubernetes.io/name: archive-serve
  ports:
    - port: 9090
      targetPort: 9090
      protocol: TCP
      name: http
  type: ClusterIP
