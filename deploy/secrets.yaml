apiVersion: v1
kind: Secret
metadata:
  name: factory-secrets
  namespace: factory
type: Opaque
stringData:
  GITHUB_TOKEN: "REPLACE_ME"
  GITHUB_USER: "REPLACE_ME"
  REDDIT_USER_AGENT: "factory/1.0"
  FACTORY_DATA_DIR: "/srv/factory"
  FACTORY_GIT_DIR: "/srv/git"
---
# Claude Code Max subscription credentials
# Create from your local machine:
#   kubectl create secret generic claude-credentials \
#     --namespace factory \
#     --from-file=credentials.json=$HOME/.claude/.credentials.json
#
# To refresh after token expiry:
#   claude login   (on your Mac)
#   kubectl create secret generic claude-credentials \
#     --namespace factory \
#     --from-file=credentials.json=$HOME/.claude/.credentials.json \
#     --dry-run=client -o yaml | kubectl apply -f -
apiVersion: v1
kind: Secret
metadata:
  name: claude-credentials
  namespace: factory
type: Opaque
